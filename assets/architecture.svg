<svg width="900" height="1200" viewBox="0 0 900 1200" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: Arial, sans-serif; fill: #e5e7eb; }
    .title { font-size: 20px; font-weight: bold; }
    .label { font-size: 14px; fill: #9ca3af; }
    .box { fill: #1f2937; stroke: #374151; stroke-width: 2; rx: 12; }
    .highlight { stroke: #8b5cf6; }
    .green { stroke: #10b981; }
    .orange { stroke: #f97316; }
    .blue { stroke: #3b82f6; }
  </style>

  <!-- Background -->
  <rect x="0" y="0" width="900" height="1200" fill="none"/>

  <!-- Input -->
  <rect x="150" y="50" width="600" height="80" class="box highlight"/>
  <text x="450" y="85" text-anchor="middle" class="title">INPUT</text>
  <text x="450" y="110" text-anchor="middle" class="label">CV · job description · preferences</text>

  <!-- Intake -->
  <rect x="150" y="160" width="600" height="100" class="box highlight"/>
  <text x="450" y="200" text-anchor="middle" class="title">① intake &amp; ranking</text>
  <text x="450" y="230" text-anchor="middle" class="label">discover · normalize · filter · rank</text>

  <!-- Queue -->
  <rect x="150" y="300" width="600" height="90" class="box green"/>
  <text x="450" y="340" text-anchor="middle" class="title">② opportunity queue</text>
  <text x="450" y="365" text-anchor="middle" class="label">priority shortlist</text>

  <!-- Decision runtime -->
  <rect x="150" y="420" width="600" height="100" class="box orange"/>
  <text x="450" y="460" text-anchor="middle" class="title">③ decision runtime</text>
  <text x="450" y="485" text-anchor="middle" class="label">state · policy gates · expected value · budget</text>

  <!-- Loop -->
  <rect x="100" y="560" width="700" height="220" class="box orange"/>
  <text x="450" y="600" text-anchor="middle" class="title">④ expected value decision loop</text>
  <text x="450" y="640" text-anchor="middle" class="label">plan → select tool → execute → evaluate</text>

  <text x="450" y="710" text-anchor="middle" class="title">DECISION</text>
  <text x="450" y="740" text-anchor="middle" class="label">prepare · queue · skip · escalate</text>

  <!-- Execute -->
  <rect x="150" y="820" width="600" height="90" class="box"/>
  <text x="450" y="860" text-anchor="middle" class="title">⑤ execute decision</text>
  <text x="450" y="885" text-anchor="middle" class="label">prepare + human submit · requeue · skip · escalate</text>

  <!-- Adaptation -->
  <rect x="150" y="940" width="600" height="120" class="box blue"/>
  <text x="450" y="980" text-anchor="middle" class="title">⑥ policy adaptation</text>
  <text x="450" y="1010" text-anchor="middle" class="label">outcomes → ranking / thresholds / retries</text>
  <text x="450" y="1040" text-anchor="middle" class="label">feedback loop → policy tuning</text>

</svg>